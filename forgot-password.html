<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password · Arko</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jura&family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Public+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="signup.css" />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="favicon-512.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
</head>
<body>

  <header class="hero">
    <nav class="nav">
      <a href="index.html" class="wordmark" style="text-decoration: none;"><span class="wordmark-brand">Arko</span> | Early Access</a>
      <div class="nav-auth">
        <button type="button" class="btn-signup" onclick="window.location.href='login.html'">Log in</button>
      </div>
    </nav>

    <div class="auth-content">
      <h1>Reset your password</h1>
      <p class="auth-subhead">Enter your email and we'll send you a reset link.</p>

      <form class="auth-form" id="forgot-form">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@email.com" required />

        <button type="submit" id="forgot-button">Send reset link</button>
      </form>

      <p class="auth-message" id="auth-message"></p>

      <p class="auth-switch">Remembered your password? <a href="login.html">Log in</a></p>
    </div>
  </header>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = "https://pkfkdmjuwkfkbkmlmoxq.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBrZmtkbWp1d2tma2JrbWxtb3hxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNzIxMTIsImV4cCI6MjA5ODg0ODExMn0.MWUcOvwttx1y0iE_Rcc6aUoJ7F5jmT-mMrQfOTwqmOY";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById('forgot-form');
    const button = document.getElementById('forgot-button');
    const message = document.getElementById('auth-message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      message.textContent = '';
      message.className = 'auth-message';

      const email = document.getElementById('email').value.trim();

      button.disabled = true;
      button.textContent = 'Sending...';

      try {
        const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + '/reset-password.html'
        });

        if (error) {
          console.error('Reset request error:', error);
          message.textContent = error.message || 'Something went wrong. Please try again.';
          message.classList.add('auth-message-error');
        } else {
          message.textContent = "If an account exists for that email, a reset link has been sent. Check your inbox.";
          message.classList.add('auth-message-success');
          form.reset();
        }
      } catch (err) {
        console.error('Unexpected error:', err);
        message.textContent = 'Network error — please check your connection and try again.';
        message.classList.add('auth-message-error');
      } finally {
        button.disabled = false;
        button.textContent = 'Send reset link';
      }
    });
  </script>

</body>
</html>
