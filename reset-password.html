<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set New Password · Arko</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jura&family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Public+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="signup.css" />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="favicon-512.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
</head>
<body>

  <header class="hero">
    <nav class="nav">
      <a href="index.html" class="wordmark" style="text-decoration: none;"><span class="wordmark-brand">Arko</span> | Pre-Alpha</a>
    </nav>

    <div class="auth-content">
      <h1>Set a new password</h1>
      <p class="auth-subhead">Choose a new password for your account.</p>

      <form class="auth-form" id="reset-form">
        <label for="password">New password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required minlength="8" />

        <label for="confirm-password">Confirm new password</label>
        <input type="password" id="confirm-password" name="confirm-password" placeholder="••••••••" required minlength="8" />

        <button type="submit" id="reset-button">Update password</button>
      </form>

      <p class="auth-message" id="auth-message"></p>
    </div>
  </header>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = "https://pkfkdmjuwkfkbkmlmoxq.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBrZmtkbWp1d2tma2JrbWxtb3hxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNzIxMTIsImV4cCI6MjA5ODg0ODExMn0.MWUcOvwttx1y0iE_Rcc6aUoJ7F5jmT-mMrQfOTwqmOY";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById('reset-form');
    const button = document.getElementById('reset-button');
    const message = document.getElementById('auth-message');

    let hasRecoverySession = false;

    // Supabase puts the recovery token in the URL and fires this event
    // once it has processed it into a temporary session.
    supabaseClient.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        hasRecoverySession = true;
      }
    });

    // Fallback check in case the event already fired before we attached the listener
    (async () => {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) hasRecoverySession = true;
    })();

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      message.textContent = '';
      message.className = 'auth-message';

      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      if (password !== confirmPassword) {
        message.textContent = "Passwords don't match.";
        message.classList.add('auth-message-error');
        return;
      }

      if (!hasRecoverySession) {
        message.textContent = "This reset link is invalid or has expired. Please request a new one.";
        message.classList.add('auth-message-error');
        return;
      }

      button.disabled = true;
      button.textContent = 'Updating...';

      try {
        const { error } = await supabaseClient.auth.updateUser({ password });

        if (error) {
          console.error('Update password error:', error);
          message.textContent = error.message || 'Could not update your password. Please try again.';
          message.classList.add('auth-message-error');
          return;
        }

        message.textContent = "Password updated! Redirecting to log in...";
        message.classList.add('auth-message-success');
        await supabaseClient.auth.signOut();
        setTimeout(() => { window.location.href = 'login.html'; }, 1500);

      } catch (err) {
        console.error('Unexpected error:', err);
        message.textContent = 'Network error — please try again.';
        message.classList.add('auth-message-error');
      } finally {
        button.disabled = false;
        button.textContent = 'Update password';
      }
    });
  </script>

</body>
</html>
