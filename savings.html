<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visual Savings · Arko</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jura&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,300&family=IBM+Plex+Mono:wght@400;500;600&family=Public+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dashboard.css" />
  <link rel="stylesheet" href="savings.css" />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="favicon-512.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
</head>
<body>

  <header class="dash-header">
    <nav class="nav">
      <a href="dashboard.html" class="wordmark" style="text-decoration:none;"><span class="wordmark-brand">Arko</span> | Early Access</a>
      <div class="nav-auth">
        <span id="user-email" class="user-email"></span>
        <button type="button" id="view-log-button" class="btn-ghost">Dashboard</button>

        <div class="settings-wrap">
          <button type="button" id="ledger-menu-btn" class="btn-icon btn-ledger" aria-label="Premium tools">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
              <line x1="8.5" y1="7" x2="15.5" y2="7"></line>
              <line x1="8.5" y1="11" x2="15.5" y2="11"></line>
            </svg>
            <span class="lock-badge" id="ledger-lock-badge" style="display:none;">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="1"></rect><path d="M8 11V7a4 4 0 0 1 8 0v4"></path></svg>
            </span>
          </button>
          <div class="ledger-dropdown" id="ledger-dropdown">
            <div class="ledger-dropdown-inner" id="ledger-dropdown-inner"></div>
          </div>
        </div>

        <button type="button" id="logout-button" class="btn-logout">Log out</button>
      </div>
    </nav>
  </header>

  <div class="wip-banner">Early development · some features may not be live</div>

  <main class="dash-main" id="sav-main" style="display:none;">

    <section class="overview-section">
      <div class="overview-section-head">
        <span class="overview-section-title sav-title">Visual Savings</span>
        <span class="overview-section-sub">Watch each goal fill up as you save toward it</span>
      </div>
    </section>

    <div class="sav-goals-grid" id="sav-goals-grid"></div>

    <button type="button" class="sav-add-goal-btn" id="sav-add-goal-btn">
      <span class="sav-add-plus">+</span>
      <span>New savings goal</span>
    </button>

  </main>

  <p id="loading-message" class="loading-message">Loading your goals...</p>

  <!-- ================= GOAL DETAIL / EDIT ================= -->
  <div class="mfa-overlay" id="goal-detail-overlay">
    <div class="mfa-modal" style="max-width: 440px;">
      <div class="mfa-modal-head">
        <h2 id="goal-detail-heading">Savings goal</h2>
        <button type="button" class="mfa-modal-close" id="goal-detail-close">×</button>
      </div>
      <div class="mfa-modal-body" id="goal-detail-body"></div>
    </div>
  </div>

  <!-- ================= NEW GOAL: THEME PICKER ================= -->
  <div class="mfa-overlay" id="new-goal-overlay">
    <div class="mfa-modal" style="max-width: 460px;">
      <div class="mfa-modal-head">
        <h2>New savings goal</h2>
        <button type="button" class="mfa-modal-close" id="new-goal-close">×</button>
      </div>
      <div class="mfa-modal-body" id="new-goal-body"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = "https://pkfkdmjuwkfkbkmlmoxq.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBrZmtkbWp1d2tma2JrbWxtb3hxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNzIxMTIsImV4cCI6MjA5ODg0ODExMn0.MWUcOvwttx1y0iE_Rcc6aUoJ7F5jmT-mMrQfOTwqmOY";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUserId = null;
    let currentUserEmail = null;
    let isPaidUser = false;
    let goals = [];
    let linkedAccounts = [];

    function arkoDialog(message, { mode = 'alert', danger = false } = {}) {
      return new Promise(resolve => {
        const overlay = document.getElementById('arko-dialog-overlay');
        const msgEl = document.getElementById('arko-dialog-message');
        const actionsEl = document.getElementById('arko-dialog-actions');
        const iconEl = document.getElementById('arko-dialog-icon');
        msgEl.textContent = message;
        overlay.classList.toggle('arko-dialog-danger', danger);
        iconEl.innerHTML = danger
          ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>'
          : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>';

        actionsEl.innerHTML = mode === 'confirm'
          ? `<button type="button" class="arko-dialog-btn arko-dialog-btn-cancel" id="arko-dialog-cancel-btn">Cancel</button><button type="button" class="arko-dialog-btn arko-dialog-btn-confirm" id="arko-dialog-confirm-btn">Confirm</button>`
          : `<button type="button" class="arko-dialog-btn arko-dialog-btn-confirm arko-dialog-btn-single" id="arko-dialog-confirm-btn">OK</button>`;

        overlay.classList.add('open');
        const cleanup = (result) => { overlay.classList.remove('open'); resolve(result); };
        document.getElementById('arko-dialog-confirm-btn').addEventListener('click', () => cleanup(true), { once: true });
        const cancelBtn = document.getElementById('arko-dialog-cancel-btn');
        if (cancelBtn) cancelBtn.addEventListener('click', () => cleanup(false), { once: true });
      });
    }
    function arkoConfirm(message, danger = false) { return arkoDialog(message, { mode: 'confirm', danger }); }
    function arkoAlert(message, danger = false) { return arkoDialog(message, { mode: 'alert', danger }); }

    function round2(n) { return Math.round((n + Number.EPSILON) * 100) / 100; }
    function money(n) { return '$' + Number(n || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

    const THEMES = {
      plant:      { label: 'Plant',            accent: '#6EC496', accentBright: '#7FE0BB', glowRgb: '110,196,150' },
      ship:       { label: 'Ship in a Bottle',  accent: '#6E8FA3', accentBright: '#9FC1D6', glowRgb: '110,143,163' },
      balloon:    { label: 'Hot Air Balloon',   accent: '#E0806A', accentBright: '#F0A088', glowRgb: '224,128,106' },
      rocket:     { label: 'Rocket',            accent: '#D8BC7A', accentBright: '#E7C766', glowRgb: '224,192,110' },
      lighthouse: { label: 'Lighthouse',        accent: '#C97B4A', accentBright: '#E8A876', glowRgb: '201,123,74' },
      kite:       { label: 'Kite',              accent: '#7FC4D9', accentBright: '#A6E0EF', glowRgb: '127,196,217' },
    };

    async function init() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) { window.location.href = 'login.html'; return; }
      currentUserId = session.user.id;
      currentUserEmail = session.user.email;
      document.getElementById('user-email').textContent = session.user.email;

      const { data: billing } = await supabaseClient.from('user_billing').select('*').eq('user_id', currentUserId).maybeSingle();
      if (billing) {
        isPaidUser = !!billing.is_paid;
        const trialExpired = new Date(billing.trial_end) < new Date();
        if (trialExpired && !billing.is_paid) { window.location.href = 'paywall.html'; return; }
        if (!isPaidUser) { window.location.href = 'dashboard.html'; return; }
      }

      setupLedgerMenu();
      document.getElementById('logout-button').addEventListener('click', async () => { await supabaseClient.auth.signOut(); window.location.href = 'login.html'; });
      document.getElementById('view-log-button').addEventListener('click', () => { window.location.href = 'dashboard.html'; });
      setupNewGoalFlow();
      setupGoalDetailOverlay();

      await loadGoals();

      document.getElementById('loading-message').style.display = 'none';
      document.getElementById('sav-main').style.display = 'block';
    }

    async function loadGoals() {
      const { data: linked } = await supabaseClient.from('linked_accounts').select('id, balance, nickname, institution_name, account_type').eq('user_id', currentUserId);
      linkedAccounts = linked || [];

      const { data: goalRows } = await supabaseClient.from('savings_goals').select('*').eq('user_id', currentUserId).order('sort_order', { ascending: true });
      const { data: goalAccounts } = await supabaseClient.from('savings_goal_accounts').select('*').eq('user_id', currentUserId);

      const balanceById = Object.fromEntries(linkedAccounts.map(a => [a.id, Number(a.balance) || 0]));

      goals = (goalRows || []).map(g => {
        const links = (goalAccounts || []).filter(ga => ga.goal_id === g.id);
        const connectedTotal = links.reduce((s, l) => {
          const bal = balanceById[l.linked_account_id] || 0;
          let contribution;
          if (l.allocated_percent != null) contribution = bal * Number(l.allocated_percent) / 100;
          else if (l.allocated_amount != null) contribution = Math.min(bal, Number(l.allocated_amount));
          else contribution = bal; // nothing set — the original "whole account" behavior
          return s + contribution;
        }, 0);
        const current = links.length ? connectedTotal : Number(g.manual_amount) || 0;
        return { ...g, links, current: round2(current) };
      });

      renderGoals();
    }

    // Shared celebration burst — used by every theme at 100%, but the
    // shape (star, confetti rect, spark, petal) and color scheme vary
    // per theme so each one still feels distinct rather than the same
    // effect painted six different colors. cx/cy is the point the
    // burst radiates from — different for each theme since that's
    // wherever the "top" of that theme's illustration actually is.
    function celebrationBurstSvg(shape, cx, cy, accent, accentBright) {
      const particles = [
        { dx: -34, dy: -18, delay: 0.0,  size: 1.0 },
        { dx: 30,  dy: -26, delay: 0.12, size: 0.85 },
        { dx: -20, dy: -40, delay: 0.24, size: 0.7 },
        { dx: 36,  dy: 4,   delay: 0.36, size: 0.9 },
        { dx: -38, dy: 10,  delay: 0.08, size: 0.75 },
        { dx: 10,  dy: -46, delay: 0.3,  size: 0.65 },
      ];
      const shapeSvg = (p, i) => {
        const color = i % 2 === 0 ? accentBright : accent;
        if (shape === 'star') {
          return `<path d="M0 -6 L1.8 -1.8 L6 0 L1.8 1.8 L0 6 L-1.8 1.8 L-6 0 L-1.8 -1.8 Z" fill="${color}"/>`;
        }
        if (shape === 'confetti') {
          return `<rect x="-3" y="-4" width="6" height="8" rx="1" fill="${color}"/>`;
        }
        if (shape === 'petal') {
          return `<ellipse cx="0" cy="0" rx="5" ry="3" fill="${color}"/>`;
        }
        // spark
        return `<circle cx="0" cy="0" r="3" fill="${color}"/>`;
      };
      return `<g class="sav-celebrate">
        ${particles.map((p, i) => `
          <g class="sav-celebrate-particle" style="transform-origin:${cx}px ${cy}px; animation-delay:${p.delay}s;"
             transform="translate(${cx} ${cy})">
            <g transform="translate(${p.dx} ${p.dy}) scale(${p.size})">${shapeSvg(p, i)}</g>
          </g>
        `).join('')}
      </g>`;
    }

    function goalIllustrationSvg(theme, pct, accent, accentBright) {
      const clampedPct = Math.max(0, Math.min(100, pct));
      const fillY = 176 - (176 * clampedPct / 100);

      if (theme === 'plant') {
        const stemHeight = 10 + (clampedPct / 100) * 90;
        const stemTopY = 150 - stemHeight;
        const leafScale = 0.3 + (clampedPct / 100) * 0.9;
        return `
          <svg viewBox="0 0 160 180" class="sav-illust">
            <defs>
              <linearGradient id="potGrad-${theme}" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="${accentBright}" stop-opacity="0.9"/>
                <stop offset="100%" stop-color="${accent}" stop-opacity="0.7"/>
              </linearGradient>
            </defs>
            <ellipse cx="80" cy="168" rx="34" ry="7" fill="rgba(0,0,0,0.25)"/>
            <path d="M55 150 L105 150 L98 172 L62 172 Z" fill="#2C1F14" stroke="${accent}" stroke-width="1.5"/>
            <rect x="52" y="144" width="56" height="10" rx="3" fill="#3A2A1A" stroke="${accent}" stroke-width="1.5"/>
            <line x1="80" y1="150" x2="80" y2="${stemTopY}" stroke="${accent}" stroke-width="3.5" stroke-linecap="round"/>
            <g class="sav-anim-sway" style="transform-origin:80px ${stemTopY + stemHeight * 0.35}px;">
              <g transform="translate(80 ${stemTopY + stemHeight * 0.35}) scale(${leafScale})" opacity="${clampedPct > 5 ? 1 : 0}">
                <path d="M0 0 C -22 -10, -30 -34, -8 -46 C 4 -28, 8 -12, 0 0 Z" fill="url(#potGrad-${theme})"/>
              </g>
            </g>
            <g class="sav-anim-sway" style="transform-origin:80px ${stemTopY + stemHeight * 0.62}px; animation-delay:-0.6s;">
              <g transform="translate(80 ${stemTopY + stemHeight * 0.62}) scale(${leafScale * 0.85})" opacity="${clampedPct > 20 ? 1 : 0}">
                <path d="M0 0 C 20 -8, 28 -30, 6 -40 C -6 -24, -8 -10, 0 0 Z" fill="url(#potGrad-${theme})"/>
              </g>
            </g>
            <g class="sav-anim-sway" style="transform-origin:80px ${stemTopY}px; animation-delay:-1.1s;">
              <g transform="translate(80 ${stemTopY}) scale(${leafScale * 1.05})" opacity="${clampedPct > 60 ? 1 : 0}">
                <path d="M0 0 C -18 -20, -6 -38, 0 -44 C 6 -38, 18 -20, 0 0 Z" fill="url(#potGrad-${theme})"/>
              </g>
            </g>
            ${clampedPct >= 100 ? celebrationBurstSvg('petal', 80, stemTopY - 6, accent, accentBright) : ''}
          </svg>`;
      }

      if (theme === 'ship') {
        return `
          <svg viewBox="0 0 160 180" class="sav-illust">
            <defs>
              <clipPath id="bottleClip-${theme}"><path d="M62 8 h36 v26 c18 10 30 30 30 56 v58 a14 14 0 0 1 -14 14 h-68 a14 14 0 0 1 -14 -14 v-58 c0 -26 12 -46 30 -56 z"/></clipPath>
            </defs>
            <path d="M62 8 h36 v26 c18 10 30 30 30 56 v58 a14 14 0 0 1 -14 14 h-68 a14 14 0 0 1 -14 -14 v-58 c0 -26 12 -46 30 -56 z"
              fill="rgba(255,255,255,0.03)" stroke="${accent}" stroke-width="2" opacity="0.9"/>
            <rect x="58" y="2" width="44" height="12" rx="3" fill="${accent}" opacity="0.8"/>
            <g clip-path="url(#bottleClip-${theme})">
              <rect x="10" y="${fillY}" width="140" height="180" fill="${accent}" opacity="0.5"/>
              <path d="M10 ${fillY} q 20 -5 40 0 t 40 0 t 40 0 t 20 0 v 6 h -140 z" fill="${accentBright}" opacity="0.7"/>
              <g class="sav-anim-bob" style="transform-origin:80px ${fillY}px;" transform="translate(80 ${fillY - 4})" opacity="${clampedPct > 3 ? 1 : 0}">
                <path d="M-20 0 L20 0 L14 12 L-14 12 Z" fill="#3A2A1A" stroke="${accent}" stroke-width="1.5"/>
                <line x1="0" y1="0" x2="0" y2="-24" stroke="${accent}" stroke-width="2"/>
                <path d="M0 -24 L16 -16 L0 -10 Z" fill="${accentBright}"/>
                <path d="M0 -22 L-12 -14 L0 -9 Z" fill="${accent}"/>
              </g>
            </g>
            ${clampedPct >= 100 ? celebrationBurstSvg('star', 80, 20, accent, accentBright) : ''}
          </svg>`;
      }

      if (theme === 'balloon') {
        // Rises up the frame as pct increases — 100% sits near the top,
        // 0% sits low with just the basket visible above the ground line.
        const riseY = 148 - (clampedPct / 100) * 92;
        return `
          <svg viewBox="0 0 160 180" class="sav-illust">
            <defs>
              <radialGradient id="balloonGrad-${theme}" cx="35%" cy="30%" r="75%">
                <stop offset="0%" stop-color="${accentBright}"/>
                <stop offset="100%" stop-color="${accent}"/>
              </radialGradient>
            </defs>
            <ellipse cx="80" cy="172" rx="40" ry="6" fill="rgba(0,0,0,0.22)"/>
            <g class="sav-anim-float" style="transform-origin:80px ${riseY}px;" transform="translate(0 ${riseY - 60})">
              <ellipse cx="80" cy="60" rx="34" ry="42" fill="url(#balloonGrad-${theme})"/>
              <path d="M60 96 Q80 106 100 96" stroke="${accent}" stroke-width="2" fill="none" opacity="0.6"/>
              <line x1="64" y1="98" x2="70" y2="120" stroke="${accent}" stroke-width="1.5"/>
              <line x1="96" y1="98" x2="90" y2="120" stroke="${accent}" stroke-width="1.5"/>
              <line x1="80" y1="102" x2="80" y2="120" stroke="${accent}" stroke-width="1.5"/>
              <rect x="68" y="120" width="24" height="16" rx="2" fill="#3A2A1A" stroke="${accent}" stroke-width="1.5"/>
            </g>
            ${clampedPct >= 100 ? celebrationBurstSvg('confetti', 80, riseY, accent, accentBright) : ''}
          </svg>`;
      }

      if (theme === 'rocket') {
        const riseY = 150 - (clampedPct / 100) * 100;
        return `
          <svg viewBox="0 0 160 180" class="sav-illust">
            <defs>
              <linearGradient id="rocketGrad-${theme}" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="${accentBright}"/>
                <stop offset="100%" stop-color="${accent}"/>
              </linearGradient>
            </defs>
            <line x1="80" y1="8" x2="80" y2="172" stroke="rgba(255,255,255,0.08)" stroke-width="2" stroke-dasharray="3 6"/>
            <ellipse cx="80" cy="172" rx="30" ry="6" fill="rgba(0,0,0,0.22)"/>
            <g class="sav-anim-bob" style="transform-origin:80px ${riseY}px;" transform="translate(0 ${riseY - 40})">
              <path d="M80 6 C96 26 98 56 96 76 L64 76 C62 56 64 26 80 6 Z" fill="url(#rocketGrad-${theme})"/>
              <circle cx="80" cy="42" r="9" fill="#171D24" stroke="${accentBright}" stroke-width="2"/>
              <path d="M64 60 L46 78 L64 74 Z" fill="${accent}"/>
              <path d="M96 60 L114 78 L96 74 Z" fill="${accent}"/>
              <g class="sav-anim-flicker">
                <path d="M70 76 L80 100 L90 76 Z" fill="${accentBright}"/>
                <path d="M74 76 L80 92 L86 76 Z" fill="#fff" opacity="0.7"/>
              </g>
            </g>
            ${clampedPct >= 100 ? celebrationBurstSvg('spark', 80, riseY - 30, accent, accentBright) : ''}
          </svg>`;
      }

      if (theme === 'lighthouse') {
        // Tower height is fixed — what grows with pct is the beam's
        // reach and brightness, plus a rotating sweep once there's
        // meaningfully something to shine.
        const beamLen = 20 + (clampedPct / 100) * 90;
        const beamOpacity = 0.15 + (clampedPct / 100) * 0.55;
        return `
          <svg viewBox="0 0 160 180" class="sav-illust">
            <defs>
              <linearGradient id="towerGrad-${theme}" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="${accentBright}"/>
                <stop offset="100%" stop-color="${accent}"/>
              </linearGradient>
            </defs>
            <ellipse cx="80" cy="172" rx="44" ry="6" fill="rgba(0,0,0,0.22)"/>
            <path d="M64 168 L70 60 L90 60 L96 168 Z" fill="url(#towerGrad-${theme})" opacity="0.85"/>
            <rect x="66" y="70" width="8" height="10" fill="#171D24" opacity="0.5"/>
            <rect x="86" y="90" width="8" height="10" fill="#171D24" opacity="0.5"/>
            <rect x="66" y="110" width="8" height="10" fill="#171D24" opacity="0.5"/>
            <rect x="86" y="130" width="8" height="10" fill="#171D24" opacity="0.5"/>
            <rect x="58" y="48" width="44" height="14" rx="2" fill="${accent}" stroke="${accentBright}" stroke-width="1.5"/>
            <path d="M64 48 L80 30 L96 48 Z" fill="${accentBright}"/>
            <g class="sav-anim-beam" style="transform-origin:80px 55px;" opacity="${clampedPct > 2 ? 1 : 0}">
              <path d="M80 55 L${80 + beamLen} ${40 - beamLen * 0.28} L${80 + beamLen} ${70 + beamLen * 0.28} Z" fill="${accentBright}" opacity="${beamOpacity}"/>
            </g>
            <circle cx="80" cy="55" r="5" fill="${accentBright}"/>
            ${clampedPct >= 100 ? celebrationBurstSvg('star', 80, 30, accent, accentBright) : ''}
          </svg>`;
      }

      // kite
      const riseY = 150 - (clampedPct / 100) * 110;
      return `
        <svg viewBox="0 0 160 180" class="sav-illust">
          <defs>
            <linearGradient id="kiteGrad-${theme}" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="${accentBright}"/>
              <stop offset="100%" stop-color="${accent}"/>
            </linearGradient>
          </defs>
          <path d="M80 176 Q68 ${riseY + 70} 80 ${riseY + 14}" stroke="${accent}" stroke-width="1.5" fill="none" opacity="0.5"/>
          <g class="sav-anim-sway" style="transform-origin:80px ${riseY}px;" transform="translate(0 ${riseY - 60})">
            <path d="M80 20 L104 60 L80 100 L56 60 Z" fill="url(#kiteGrad-${theme})"/>
            <line x1="80" y1="20" x2="80" y2="100" stroke="${accentBright}" stroke-width="1.5" opacity="0.7"/>
            <line x1="56" y1="60" x2="104" y2="60" stroke="${accentBright}" stroke-width="1.5" opacity="0.7"/>
            <path d="M80 100 Q76 110 82 116 Q76 122 82 128 Q76 134 82 140" stroke="${accent}" stroke-width="2" fill="none" stroke-linecap="round"/>
          </g>
          ${clampedPct >= 100 ? celebrationBurstSvg('confetti', 80, riseY, accent, accentBright) : ''}
        </svg>`;
    }

    function renderGoals() {
      const grid = document.getElementById('sav-goals-grid');
      if (!goals.length) {
        grid.innerHTML = `<p class="sav-empty-hint">No savings goals yet — add one below to start watching it grow.</p>`;
        return;
      }
      grid.innerHTML = goals.map(g => {
        const theme = THEMES[g.theme] || THEMES.plant;
        const target = Number(g.target_amount) || 0;
        const pct = target > 0 ? Math.min(100, round2((g.current / target) * 100)) : 0;
        return `
        <button type="button" class="sav-goal-card" data-goal-id="${g.id}" style="--goal-glow:${theme.glowRgb};">
          <div class="sav-goal-illust-wrap">${goalIllustrationSvg(g.theme, pct, theme.accent, theme.accentBright)}</div>
          <span class="sav-goal-name">${g.name.replace(/</g,'&lt;')}</span>
          <span class="sav-goal-amounts">${money(g.current)} <span class="sav-goal-of">of</span> ${money(target)}</span>
          <div class="sav-goal-bar-track"><div class="sav-goal-bar-fill" style="width:${pct}%; background:${theme.accent};"></div></div>
          <span class="sav-goal-pct" style="color:${theme.accentBright};">${pct}%</span>
        </button>`;
      }).join('');

      grid.querySelectorAll('.sav-goal-card').forEach(card => {
        card.addEventListener('click', () => openGoalDetail(card.dataset.goalId));
      });
    }

    function linkContribution(l, acct) {
      const bal = acct ? Number(acct.balance) || 0 : 0;
      if (l.allocated_percent != null) return round2(bal * Number(l.allocated_percent) / 100);
      if (l.allocated_amount != null) return round2(Math.min(bal, Number(l.allocated_amount)));
      return round2(bal);
    }

    function linkAllocationLabel(l, acct) {
      const contribution = linkContribution(l, acct);
      if (l.allocated_percent != null) return `${l.allocated_percent}% (${money(contribution)})`;
      if (l.allocated_amount != null) return `${money(contribution)} fixed`;
      return `${money(contribution)} · whole account`;
    }

    // Matches the chip toggle already used for Dashboard's Subtract/
    // Transfer category pickers — same dot indicator, same active-state
    // animation — rather than falling back to a plain native radio,
    // which would be the only unstyled control on the page.
    function chipRadioHtml(name, value, label, checked) {
      return `<label class="chip sav-alloc-chip${checked ? ' chip-active' : ''}">
        <input type="radio" name="${name}" value="${value}" ${checked ? 'checked' : ''} />
        <span class="chip-dot"></span> ${label}
      </label>`;
    }

    function openGoalDetail(goalId) {
      const g = goals.find(x => x.id === goalId);
      if (!g) return;
      document.getElementById('goal-detail-heading').textContent = g.name;
      const body = document.getElementById('goal-detail-body');
      const target = Number(g.target_amount) || 0;
      const pct = target > 0 ? Math.min(100, round2((g.current / target) * 100)) : 0;
      const hasConnections = g.links.length > 0;

      const unlinkedAccounts = linkedAccounts.filter(a => !g.links.some(l => l.linked_account_id === a.id));

      const linkPickerHtml = (options) => `
        <div class="mfa-field" style="margin-top:12px;">
          <label>Link another account</label>
          <select id="sav-link-account-select">
            <option value="">Choose an account…</option>
            ${options.map(a => `<option value="${a.id}">${(a.nickname || a.institution_name).replace(/</g,'&lt;')} — ${money(a.balance)}</option>`).join('')}
          </select>
        </div>
        <div class="sav-alloc-mode-row">
          ${chipRadioHtml('sav-alloc-mode', 'whole', 'Whole account', true)}
          ${chipRadioHtml('sav-alloc-mode', 'percent', 'Percent', false)}
          ${chipRadioHtml('sav-alloc-mode', 'amount', 'Fixed $', false)}
        </div>
        <input type="number" id="sav-alloc-value-input" step="0.01" placeholder="e.g. 20" style="display:none; margin-top:8px;" />
        <button type="button" class="mfa-verify-btn" id="sav-link-account-btn" style="margin-top:10px;">Link account</button>
      `;

      body.innerHTML = `
        <div class="sav-detail-illust">${goalIllustrationSvg(g.theme, pct, THEMES[g.theme].accent, THEMES[g.theme].accentBright)}</div>
        <p class="mfa-modal-sub" style="text-align:center; margin-bottom:4px;">${money(g.current)} of ${money(target)} · ${pct}%</p>
        ${hasConnections ? `
          <p class="mfa-modal-sub" style="margin-top:14px;">Linked accounts</p>
          <div class="sav-linked-list">
            ${g.links.map(l => {
              const acct = linkedAccounts.find(a => a.id === l.linked_account_id);
              return `<div class="sav-linked-row">
                <span class="sav-linked-name">${acct ? (acct.nickname || acct.institution_name) : 'Account'}</span>
                <span class="sav-linked-alloc">${linkAllocationLabel(l, acct)}</span>
                <button type="button" class="sav-edit-alloc-btn" data-link-id="${l.id}" data-account-id="${l.linked_account_id}" title="Edit allocation">Edit</button>
                <button type="button" class="sav-unlink-btn" data-link-id="${l.id}">Unlink</button>
              </div>`;
            }).join('')}
          </div>
          <div id="sav-edit-alloc-wrap"></div>
          ${unlinkedAccounts.length ? linkPickerHtml(unlinkedAccounts) : ''}
        ` : `
          <div class="mfa-field" style="margin-top:14px;">
            <label>Set aside manually</label>
            <input type="number" id="sav-manual-input" step="0.01" value="${g.current}" />
          </div>
          <button type="button" class="mfa-verify-btn" id="sav-manual-save-btn" style="margin-top:10px;">Save amount</button>
          <p class="mfa-modal-sub" style="margin-top:14px;">Or link a real account</p>
          ${linkPickerHtml(linkedAccounts)}
        `}
        <div class="mfa-field" style="margin-top:16px;">
          <label>Target amount</label>
          <input type="number" id="sav-target-input" step="0.01" value="${target}" />
        </div>
        <button type="button" class="mfa-verify-btn" id="sav-target-save-btn" style="margin-top:10px;">Update target</button>
        <button type="button" class="btn-danger" id="sav-delete-goal-btn" style="margin-top:18px; width:100%;">Delete this goal</button>
      `;

      const manualSaveBtn = document.getElementById('sav-manual-save-btn');
      if (manualSaveBtn) manualSaveBtn.addEventListener('click', async () => {
        const newAmount = round2(Math.max(0, parseFloat(document.getElementById('sav-manual-input').value) || 0));
        await supabaseClient.from('savings_goals').update({ manual_amount: newAmount }).eq('id', g.id);
        await loadGoals();
        openGoalDetail(g.id);
      });

      // Toggling the mode radios shows/hides the value input and swaps
      // its placeholder, rather than three separate always-visible
      // inputs competing for attention.
      document.querySelectorAll('input[name="sav-alloc-mode"]').forEach(radio => {
        radio.addEventListener('change', () => {
          document.querySelectorAll('input[name="sav-alloc-mode"]').forEach(r => r.closest('.chip').classList.toggle('chip-active', r.checked));
          const valueInput = document.getElementById('sav-alloc-value-input');
          const mode = document.querySelector('input[name="sav-alloc-mode"]:checked').value;
          if (mode === 'whole') { valueInput.style.display = 'none'; return; }
          valueInput.style.display = 'block';
          valueInput.placeholder = mode === 'percent' ? 'e.g. 20 (%)' : 'e.g. 200.00 ($)';
          valueInput.focus();
        });
      });

      const linkBtn = document.getElementById('sav-link-account-btn');
      if (linkBtn) linkBtn.addEventListener('click', async () => {
        const accountId = document.getElementById('sav-link-account-select').value;
        if (!accountId) { await arkoAlert('Choose an account first.'); return; }
        const mode = document.querySelector('input[name="sav-alloc-mode"]:checked').value;
        const rawValue = parseFloat(document.getElementById('sav-alloc-value-input').value) || 0;

        const row = { user_id: currentUserId, goal_id: g.id, linked_account_id: accountId };
        if (mode === 'percent') {
          if (rawValue <= 0 || rawValue > 100) { await arkoAlert('Percent needs to be between 0 and 100.'); return; }
          row.allocated_percent = round2(rawValue);
        } else if (mode === 'amount') {
          if (rawValue <= 0) { await arkoAlert('Enter an amount greater than $0.'); return; }
          row.allocated_amount = round2(rawValue);
        }
        await supabaseClient.from('savings_goal_accounts').insert(row);
        await loadGoals();
        openGoalDetail(g.id);
      });

      // Edit an existing link's allocation inline, right below the row
      // it belongs to — same "no separate menu" reasoning used
      // elsewhere in the app, rather than a whole new modal for a
      // one-field change.
      document.querySelectorAll('.sav-edit-alloc-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const link = g.links.find(l => l.id === btn.dataset.linkId);
          if (!link) return;
          const currentMode = link.allocated_percent != null ? 'percent' : (link.allocated_amount != null ? 'amount' : 'whole');
          const currentValue = link.allocated_percent != null ? link.allocated_percent : (link.allocated_amount != null ? link.allocated_amount : '');
          const wrap = document.getElementById('sav-edit-alloc-wrap');
          wrap.innerHTML = `
            <div class="sav-alloc-mode-row" style="margin-top:8px;">
              ${chipRadioHtml('sav-edit-mode', 'whole', 'Whole account', currentMode === 'whole')}
              ${chipRadioHtml('sav-edit-mode', 'percent', 'Percent', currentMode === 'percent')}
              ${chipRadioHtml('sav-edit-mode', 'amount', 'Fixed $', currentMode === 'amount')}
            </div>
            <input type="number" id="sav-edit-alloc-value" step="0.01" value="${currentMode === 'whole' ? '' : currentValue}" style="margin-top:8px; ${currentMode === 'whole' ? 'display:none;' : ''}" />
            <button type="button" class="mfa-verify-btn" id="sav-edit-alloc-save-btn" style="margin-top:8px;">Save allocation</button>
          `;
          document.querySelectorAll('input[name="sav-edit-mode"]').forEach(radio => {
            radio.addEventListener('change', () => {
              document.querySelectorAll('input[name="sav-edit-mode"]').forEach(r => r.closest('.chip').classList.toggle('chip-active', r.checked));
              const valueInput = document.getElementById('sav-edit-alloc-value');
              const mode = document.querySelector('input[name="sav-edit-mode"]:checked').value;
              valueInput.style.display = mode === 'whole' ? 'none' : 'block';
              valueInput.placeholder = mode === 'percent' ? 'e.g. 20 (%)' : 'e.g. 200.00 ($)';
            });
          });
          document.getElementById('sav-edit-alloc-save-btn').addEventListener('click', async () => {
            const mode = document.querySelector('input[name="sav-edit-mode"]:checked').value;
            const rawValue = parseFloat(document.getElementById('sav-edit-alloc-value').value) || 0;
            const updates = { allocated_percent: null, allocated_amount: null };
            if (mode === 'percent') {
              if (rawValue <= 0 || rawValue > 100) { await arkoAlert('Percent needs to be between 0 and 100.'); return; }
              updates.allocated_percent = round2(rawValue);
            } else if (mode === 'amount') {
              if (rawValue <= 0) { await arkoAlert('Enter an amount greater than $0.'); return; }
              updates.allocated_amount = round2(rawValue);
            }
            await supabaseClient.from('savings_goal_accounts').update(updates).eq('id', link.id);
            await loadGoals();
            openGoalDetail(g.id);
          });
        });
      });

      document.querySelectorAll('.sav-unlink-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          await supabaseClient.from('savings_goal_accounts').delete().eq('id', btn.dataset.linkId);
          await loadGoals();
          openGoalDetail(g.id);
        });
      });

      document.getElementById('sav-target-save-btn').addEventListener('click', async () => {
        const newTarget = round2(Math.max(0, parseFloat(document.getElementById('sav-target-input').value) || 0));
        await supabaseClient.from('savings_goals').update({ target_amount: newTarget }).eq('id', g.id);
        await loadGoals();
        openGoalDetail(g.id);
      });

      document.getElementById('sav-delete-goal-btn').addEventListener('click', async () => {
        if (!await arkoConfirm(`Delete "${g.name}"? This can't be undone.`)) return;
        await supabaseClient.from('savings_goals').delete().eq('id', g.id);
        document.getElementById('goal-detail-overlay').classList.remove('open');
        await loadGoals();
      });

      document.getElementById('goal-detail-overlay').classList.add('open');
    }

    function setupGoalDetailOverlay() {
      document.getElementById('goal-detail-close').addEventListener('click', () => document.getElementById('goal-detail-overlay').classList.remove('open'));
      document.getElementById('goal-detail-overlay').addEventListener('click', (e) => { if (e.target.id === 'goal-detail-overlay') document.getElementById('goal-detail-overlay').classList.remove('open'); });
    }

    function renderThemePicker() {
      const body = document.getElementById('new-goal-body');
      body.innerHTML = `
        <p class="mfa-modal-sub" style="margin-bottom:14px;">Pick a theme for this goal.</p>
        <div class="sav-theme-grid">
          ${Object.entries(THEMES).map(([key, t]) => `
            <button type="button" class="sav-theme-option" data-theme="${key}" style="--goal-glow:${t.glowRgb};">
              <div class="sav-theme-illust">${goalIllustrationSvg(key, 55, t.accent, t.accentBright)}</div>
              <span style="color:${t.accentBright};">${t.label}</span>
            </button>
          `).join('')}
        </div>
      `;
      body.querySelectorAll('.sav-theme-option').forEach(btn => {
        btn.addEventListener('click', () => renderNewGoalForm(btn.dataset.theme));
      });
    }

    function renderNewGoalForm(theme) {
      const body = document.getElementById('new-goal-body');
      body.innerHTML = `
        <div class="mfa-field">
          <label for="new-goal-name">Goal name</label>
          <input type="text" id="new-goal-name" placeholder="e.g. Emergency Fund" maxlength="40" style="text-align:left; letter-spacing:normal; font-family:'Public Sans',sans-serif; text-transform:none;" />
        </div>
        <div class="mfa-field" style="margin-top:12px;">
          <label for="new-goal-target">Target amount</label>
          <input type="number" id="new-goal-target" step="0.01" placeholder="0.00" />
        </div>
        <button type="button" class="mfa-verify-btn" id="new-goal-save-btn" style="margin-top:14px;">Create goal</button>
        <p class="mfa-modal-sub" id="new-goal-error" style="color:var(--error); display:none; margin-top:8px;"></p>
      `;
      document.getElementById('new-goal-name').focus();
      document.getElementById('new-goal-save-btn').addEventListener('click', async () => {
        const name = document.getElementById('new-goal-name').value.trim();
        const target = round2(Math.max(0, parseFloat(document.getElementById('new-goal-target').value) || 0));
        const errorEl = document.getElementById('new-goal-error');
        if (!name) { errorEl.textContent = 'Give it a name first.'; errorEl.style.display = 'block'; return; }

        const { error } = await supabaseClient.from('savings_goals').insert({
          user_id: currentUserId, name, theme, target_amount: target, sort_order: goals.length,
        });
        if (error) { errorEl.textContent = 'Could not create: ' + error.message; errorEl.style.display = 'block'; return; }

        document.getElementById('new-goal-overlay').classList.remove('open');
        await loadGoals();
      });
    }

    function setupNewGoalFlow() {
      document.getElementById('sav-add-goal-btn').addEventListener('click', () => {
        renderThemePicker();
        document.getElementById('new-goal-overlay').classList.add('open');
      });
      document.getElementById('new-goal-close').addEventListener('click', () => document.getElementById('new-goal-overlay').classList.remove('open'));
      document.getElementById('new-goal-overlay').addEventListener('click', (e) => { if (e.target.id === 'new-goal-overlay') document.getElementById('new-goal-overlay').classList.remove('open'); });
    }

    const TRIAL_COVERED_TOOL_IDS = ['dashboard', 'connections'];
    const PREMIUM_TOOLS = [
      { id: 'dashboard', label: 'Dashboard', desc: 'Your accounts, at a glance.', href: 'dashboard.html', iconClass: 'icon-dashboard', icon: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"></rect><rect x="14" y="3" width="7" height="7" rx="1.5"></rect><rect x="3" y="14" width="7" height="7" rx="1.5"></rect><rect x="14" y="14" width="7" height="7" rx="1.5"></rect></svg>' },
      { id: 'connections', label: 'Connections', desc: 'Every account, one net worth.', href: 'connections.html', iconClass: 'icon-connections', icon: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="6" r="3"></circle><circle cx="18" cy="18" r="3"></circle><line x1="8.6" y1="10.6" x2="15.4" y2="7.4"></line><line x1="8.6" y1="13.4" x2="15.4" y2="16.6"></line></svg>' },
      { id: 'budget', label: 'Budget Planner', desc: 'Plan, track, and archive monthly budgets.', href: 'budget.html', iconClass: 'icon-ledger', icon: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><line x1="8.5" y1="7" x2="15.5" y2="7"></line><line x1="8.5" y1="11" x2="15.5" y2="11"></line></svg>' },
      { id: 'spending', label: 'Spendings', desc: 'Monthly breakdown and subscriptions.', href: 'spending.html', iconClass: 'icon-spending', icon: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"></path><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>' },
      { id: 'investments', label: 'Investments', desc: 'Your portfolio, broken down by holding.', href: 'investments.html', iconClass: 'icon-investments', icon: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"></path><path d="M18.7 8 13 13.7l-3-3L4.3 16.4"></path></svg>' },
      { id: 'savings', label: 'Visual Savings', desc: 'Watch your goals grow.', href: 'savings.html', iconClass: 'icon-savings', icon: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6"></path><path d="M8 8h8l2 12H6z"></path><path d="M9 13h6"></path></svg>' },
    ];

    function currentFileName() {
      const seg = window.location.pathname.split('/').pop();
      const raw = seg && seg.length ? seg : 'dashboard.html';
      return raw.replace(/\.html?$/i, '');
    }

    function renderLedgerMenu() {
      const inner = document.getElementById('ledger-dropdown-inner');
      const lockBadge = document.getElementById('ledger-lock-badge');
      lockBadge.style.display = isPaidUser ? 'none' : 'flex';
      document.getElementById('ledger-menu-btn').classList.toggle('unlocked', isPaidUser);
      const here = currentFileName();

      const itemsHtml = PREMIUM_TOOLS.map((tool, i) => {
        const isCurrent = tool.href.replace(/\.html?$/i, '') === here;
        const isLocked = !isPaidUser && !TRIAL_COVERED_TOOL_IDS.includes(tool.id);
        const classes = ['ledger-tool-item'];
        if (isCurrent) classes.push('current');
        if (isLocked) classes.push('locked-preview');
        return `
          <button type="button" class="${classes.join(' ')}" data-href="${tool.href}" data-tool-id="${tool.id}"
                  style="animation-delay:${i * 55}ms" ${isCurrent ? 'disabled' : ''}>
            <span class="ledger-tool-icon ${tool.iconClass}">${tool.icon}</span>
            <span class="ledger-tool-text">
              <span class="ledger-tool-title">${tool.label}${isCurrent ? ' <span class="current-pill">current</span>' : ''}</span>
              <span class="ledger-tool-desc">${tool.desc}</span>
            </span>
            <span class="ledger-tool-arrow"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg></span>
          </button>`;
      }).join('');

      inner.innerHTML = `
        <div class="ledger-heading">Premium Tools</div>
        <p class="ledger-sub">Your unlocked workspace for deeper financial planning.</p>
        <div class="ledger-tool-list">${itemsHtml}</div>
        <div class="ledger-future-hint">More premium tools are on the way</div>
      `;

      inner.querySelectorAll('.ledger-tool-item[data-href]').forEach(btn => {
        btn.addEventListener('click', () => { if (!btn.disabled) window.location.href = btn.dataset.href; });
      });
    }

    function setupLedgerMenu() {
      const btn = document.getElementById('ledger-menu-btn');
      const dd = document.getElementById('ledger-dropdown');
      renderLedgerMenu();
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const opening = !dd.classList.contains('open');
        dd.classList.toggle('open', opening);
        if (opening) { renderLedgerMenu(); btn.classList.remove('stamp'); void btn.offsetWidth; btn.classList.add('stamp'); }
      });
      dd.addEventListener('click', (e) => e.stopPropagation());
      document.addEventListener('click', () => { dd.classList.remove('open'); btn.classList.remove('stamp'); });
    }

    init();
  </script>

  <!-- ================= CONFIRM / ALERT (replaces native browser dialogs) ================= -->
  <div class="arko-dialog-overlay" id="arko-dialog-overlay">
    <div class="arko-dialog-modal">
      <div class="arko-dialog-icon" id="arko-dialog-icon"></div>
      <p class="arko-dialog-message" id="arko-dialog-message"></p>
      <div class="arko-dialog-actions" id="arko-dialog-actions"></div>
    </div>
  </div>

</body>
</html>
