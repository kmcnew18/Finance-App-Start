<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log · Arko</title>
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="favicon-512.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jura&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,300&family=IBM+Plex+Mono:wght@400;500;600&family=Public+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dashboard.css" />
  <style>
    .wip-banner{
      text-align:center;
      padding:5px 20px;
      background:transparent;
      border-bottom:1px solid rgba(139,111,71,0.25);
      font-family:'Public Sans', sans-serif;
      font-size:11px;
      color:#b3ae9f;
      letter-spacing:.15px;
    }

    .log-date-firstofmonth{
      color:#b5822a;
      font-weight:600;
      position:relative;
    }
    .log-date-firstofmonth::after{
      content:'';
      position:absolute;
      left:0; right:0; bottom:-2px;
      height:1px;
      background:#b5822a;
      box-shadow:0 0 6px rgba(197,146,58,0.65), 0 0 2px rgba(197,146,58,0.5);
      opacity:.8;
    }
  </style>
</head>
<body>

  <header class="dash-header">
    <nav class="nav">
      <a href="dashboard.html" class="wordmark" style="text-decoration:none;"><span class="wordmark-brand">Arko</span> | Pre-Alpha</a>
      <div class="nav-auth">

        <!-- ================= PREMIUM FEATURE MENU ================= -->
        <div class="settings-wrap">
          <button type="button" id="ledger-menu-btn" class="btn-icon btn-ledger" aria-label="Premium tools">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
              <line x1="8.5" y1="7" x2="15.5" y2="7"></line>
              <line x1="8.5" y1="11" x2="15.5" y2="11"></line>
            </svg>
            <span class="lock-badge" id="ledger-lock-badge" style="display:none;">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="1"></rect><path d="M8 11V7a4 4 0 0 1 8 0v4"></path></svg>
            </span>
          </button>
          <div class="ledger-dropdown" id="ledger-dropdown">
            <div class="ledger-dropdown-inner" id="ledger-dropdown-inner"></div>
          </div>
        </div>

        <div class="settings-wrap">
          <button type="button" id="settings-gear" class="btn-icon" aria-label="Settings">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"></circle>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
          </button>
          <div class="settings-dropdown" id="settings-dropdown">
            <button type="button" id="reset-categories-btn" class="dropdown-item">Reset category totals</button>
            <button type="button" id="clear-log-btn" class="dropdown-item danger">Clear entire log</button>
            <div class="dropdown-divider"></div>
            <button type="button" id="clear-archives-btn" class="dropdown-item danger">Clear budget archives</button>
          </div>
        </div>
        <button type="button" id="back-button" class="btn-ghost">← Back to Dashboard</button>
      </div>
    </nav>
  </header>

  <div class="wip-banner">Early development · some features may not be live</div>

  <main class="dash-main">
    <h1 class="log-title">Full Log</h1>

    <div class="log-toolbar">
      <label class="log-check-label">
        <span class="log-check"><input type="checkbox" id="select-all" /><span class="check-box"></span></span>
        Select all
      </label>
      <button type="button" id="delete-selected-btn" class="btn-danger">Delete selected</button>
    </div>

    <div class="log-table-wrap">
      <table class="log-table" id="log-table">
        <thead>
          <tr>
            <th></th>
            <th>Date</th>
            <th>Amount</th>
            <th>Savings</th>
            <th>Investment</th>
            <th>Expenses</th>
            <th>Checking</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody id="log-body">
          <tr><td colspan="8" class="loading-message">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = "https://pkfkdmjuwkfkbkmlmoxq.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBrZmtkbWp1d2tma2JrbWxtb3hxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNzIxMTIsImV4cCI6MjA5ODg0ODExMn0.MWUcOvwttx1y0iE_Rcc6aUoJ7F5jmT-mMrQfOTwqmOY";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUserId = null;
    let isPaidUser = false;

    function money(n) {
      const num = Number(n || 0);
      const sign = num < 0 ? '-' : '';
      return sign + '$' + Math.abs(num).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function formatDate(d) {
      return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    }

    function isFirstOfMonth(d) {
      // d is an ISO date string like "2026-07-01" — check the day segment directly
      // to avoid timezone parsing issues shifting the date.
      const day = d.split('-')[2];
      return day === '01';
    }

    const rowClassByType = {
      add: 'log-row-add',
      subtract: 'log-row-subtract',
      transfer: 'log-row-transfer'
    };

    async function loadLog() {
      const tbody = document.getElementById('log-body');
      const { data: rows, error } = await supabaseClient
        .from('finance_log')
        .select('*')
        .eq('user_id', currentUserId)
        .order('created_at', { ascending: false });

      if (error) {
        console.error(error);
        tbody.innerHTML = '<tr><td colspan="8">Could not load your log.</td></tr>';
        return;
      }

      if (!rows || rows.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8">No entries yet.</td></tr>';
        return;
      }

      tbody.innerHTML = rows.map(r => `
        <tr class="${rowClassByType[r.action_type] || ''}">
          <td><label class="log-check"><input type="checkbox" class="row-select" data-id="${r.id}" /><span class="check-box"></span></label></td>
          <td class="${isFirstOfMonth(r.entry_date) ? 'log-date-firstofmonth' : ''}">${formatDate(r.entry_date)}</td>
          <td class="num-cell">${money(r.amount)}</td>
          <td class="num-cell">${money(r.savings)}</td>
          <td class="num-cell">${money(r.investment)}</td>
          <td class="num-cell">${money(r.expenses)}</td>
          <td class="num-cell">${money(r.checking)}</td>
          <td class="notes-cell">${r.notes ? r.notes.replace(/</g,'&lt;') : ''}</td>
        </tr>
      `).join('');
    }

    async function init() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) { window.location.href = 'login.html'; return; }
      currentUserId = session.user.id;

      const { data: billing } = await supabaseClient
        .from('user_billing').select('is_paid').eq('user_id', currentUserId).maybeSingle();
      isPaidUser = !!(billing && billing.is_paid);
      setupLedgerMenu();

      await loadLog();
    }

    document.getElementById('back-button').addEventListener('click', () => {
      window.location.href = 'dashboard.html';
    });

    document.getElementById('select-all').addEventListener('change', (e) => {
      document.querySelectorAll('.row-select').forEach(cb => cb.checked = e.target.checked);
    });

    document.getElementById('delete-selected-btn').addEventListener('click', async () => {
      const ids = Array.from(document.querySelectorAll('.row-select:checked')).map(cb => cb.dataset.id);
      if (ids.length === 0) {
        alert('No entries selected.');
        return;
      }
      if (!confirm(`Delete ${ids.length} selected entr${ids.length === 1 ? 'y' : 'ies'}? This cannot be undone.`)) return;

      const { error } = await supabaseClient.from('finance_log').delete().in('id', ids);
      if (error) { console.error(error); alert('Could not delete entries.'); return; }
      await loadLog();
    });

    // ================= SETTINGS GEAR =================
    const gearBtn = document.getElementById('settings-gear');
    const gearDropdown = document.getElementById('settings-dropdown');

    gearBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      closeLedgerMenu();
      gearDropdown.classList.toggle('open');
      gearBtn.classList.toggle('spin');
    });

    document.addEventListener('click', () => {
      gearDropdown.classList.remove('open');
      gearBtn.classList.remove('spin');
      closeLedgerMenu();
    });

    document.getElementById('reset-categories-btn').addEventListener('click', async () => {
      if (!confirm('Reset all category totals to $0.00? This cannot be undone.')) return;
      const { error } = await supabaseClient
        .from('finance_totals')
        .update({ savings: 0, investment: 0, expenses: 0, checking: 0, updated_at: new Date().toISOString() })
        .eq('user_id', currentUserId);
      if (error) console.error(error);
      gearDropdown.classList.remove('open');
      alert('Category totals reset.');
    });

    document.getElementById('clear-log-btn').addEventListener('click', async () => {
      if (!confirm('This will clear your entire log and reset all category totals to $0.00 \u2014 just like a fresh account. This cannot be undone.')) return;

      const { count: beforeCount } = await supabaseClient
        .from('finance_log')
        .select('*', { count: 'exact', head: true })
        .eq('user_id', currentUserId);

      const { data: deletedRows, error: logError } = await supabaseClient
        .from('finance_log')
        .delete()
        .eq('user_id', currentUserId)
        .select();

      if (logError) {
        console.error('Clear log error:', logError);
        alert('Could not clear the log: ' + logError.message);
        return;
      }

      const { error: totalsError } = await supabaseClient
        .from('finance_totals')
        .update({ savings: 0, investment: 0, expenses: 0, checking: 0, updated_at: new Date().toISOString() })
        .eq('user_id', currentUserId);
      if (totalsError) console.error(totalsError);

      gearDropdown.classList.remove('open');
      await loadLog();

      if (beforeCount > 0 && (!deletedRows || deletedRows.length === 0)) {
        alert('Category totals were reset, but the log entries could not be deleted. Your Supabase "finance_log" table is likely missing a DELETE policy that lets a user delete their own rows (e.g. USING (auth.uid() = user_id)). Check Row Level Security policies on that table.');
      } else {
        alert('Your account has been reset to a fresh state.');
      }
    });

    document.getElementById('clear-archives-btn').addEventListener('click', async () => {
      if (!confirm('Clear your budget archives? This permanently deletes every finalized period. Your current active period is not affected. This cannot be undone.')) return;
      const { error } = await supabaseClient
        .from('budget_periods')
        .delete()
        .eq('user_id', currentUserId)
        .eq('status', 'finalized');
      if (error) { console.error(error); alert('Could not clear your archives: ' + error.message); return; }
      gearDropdown.classList.remove('open');
      alert('Your budget archives have been cleared.');
    });

    // ================= PREMIUM FEATURE MENU =================
    // Data-driven so future premium tools are a one-line addition. Each tool
    // needs: id, label, desc, href, an iconClass for its own visual identity,
    // and an icon (raw inline SVG markup).
    const PREMIUM_TOOLS = [
      {
        id: 'dashboard',
        label: 'Dashboard',
        desc: 'Your accounts, at a glance.',
        href: 'dashboard.html',
        iconClass: 'icon-dashboard',
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"></rect><rect x="14" y="3" width="7" height="7" rx="1.5"></rect><rect x="3" y="14" width="7" height="7" rx="1.5"></rect><rect x="14" y="14" width="7" height="7" rx="1.5"></rect></svg>'
      },
      {
        id: 'budget',
        label: 'Budget Planner',
        desc: 'Plan, track, and archive monthly budgets.',
        href: 'budget.html',
        iconClass: 'icon-ledger',
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><line x1="8.5" y1="7" x2="15.5" y2="7"></line><line x1="8.5" y1="11" x2="15.5" y2="11"></line></svg>'
      }
      // Future premium tools: add another object here, e.g.
      // { id: 'reports', label: 'Reports', desc: '...', href: 'reports.html', iconClass: 'icon-reports', icon: '<svg>...</svg>' }
    ];

    function currentFileName() {
      const seg = window.location.pathname.split('/').pop();
      return seg && seg.length ? seg : 'dashboard.html';
    }

    function renderLedgerMenu() {
      const inner = document.getElementById('ledger-dropdown-inner');
      const lockBadge = document.getElementById('ledger-lock-badge');
      lockBadge.style.display = isPaidUser ? 'none' : 'flex';

      const here = currentFileName();

      const itemsHtml = PREMIUM_TOOLS.map((tool, i) => {
        const isCurrent = tool.href === here;
        const classes = ['ledger-tool-item'];
        if (isCurrent) classes.push('current');
        if (!isPaidUser) classes.push('locked-preview');
        return `
          <button type="button" class="${classes.join(' ')}" data-href="${tool.href}"
                  style="animation-delay:${i * 55}ms" ${isCurrent ? 'disabled' : ''}>
            <span class="ledger-tool-icon ${tool.iconClass}">${tool.icon}</span>
            <span class="ledger-tool-text">
              <span class="ledger-tool-title">${tool.label}${isCurrent ? ' <span class="current-pill">current</span>' : ''}</span>
              <span class="ledger-tool-desc">${tool.desc}</span>
            </span>
            <span class="ledger-tool-arrow"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg></span>
          </button>`;
      }).join('');

      inner.innerHTML = `
        <div class="ledger-heading">Premium Tools</div>
        <p class="ledger-sub">${isPaidUser
          ? 'Your unlocked workspace for deeper financial planning.'
          : 'Full monthly budgeting — with custom categories, saved defaults, and an archive of past months — is part of full access.'}</p>
        <div class="ledger-tool-list">${itemsHtml}</div>
        ${isPaidUser
          ? '<button type="button" class="ledger-link-item" id="ledger-go-archive">View archive →</button>'
          : '<button type="button" class="ledger-lock-cta" id="ledger-unlock-cta">Unlock full access — $10</button>'}
        <div class="ledger-future-hint">More premium tools are on the way</div>
      `;

      inner.querySelectorAll('.ledger-tool-item[data-href]').forEach(btn => {
        btn.addEventListener('click', () => {
          if (btn.disabled) return;
          window.location.href = isPaidUser ? btn.dataset.href : 'paywall.html';
        });
      });

      if (isPaidUser) {
        const archBtn = document.getElementById('ledger-go-archive');
        if (archBtn) archBtn.addEventListener('click', () => window.location.href = 'budget.html?history=1');
      } else {
        const unlockBtn = document.getElementById('ledger-unlock-cta');
        if (unlockBtn) unlockBtn.addEventListener('click', () => window.location.href = 'paywall.html');
      }
    }

    function closeLedgerMenu() {
      const dd = document.getElementById('ledger-dropdown');
      const btn = document.getElementById('ledger-menu-btn');
      if (dd) dd.classList.remove('open');
      if (btn) btn.classList.remove('stamp');
    }

    function setupLedgerMenu() {
      const btn = document.getElementById('ledger-menu-btn');
      const dd = document.getElementById('ledger-dropdown');

      renderLedgerMenu();

      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        gearDropdown.classList.remove('open');
        gearBtn.classList.remove('spin');
        const opening = !dd.classList.contains('open');
        dd.classList.toggle('open', opening);
        if (opening) {
          renderLedgerMenu();
          btn.classList.remove('stamp');
          void btn.offsetWidth;
          btn.classList.add('stamp');
        }
      });

      dd.addEventListener('click', (e) => e.stopPropagation());
    }

    init();
  </script>

</body>
</html>
