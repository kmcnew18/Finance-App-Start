<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up · Arko</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jura&family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Public+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="signup.css" />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="favicon-512.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <style>
    .wip-banner{
      text-align:center;
      padding:5px 20px;
      background:transparent;
      border-bottom:1px solid rgba(139,111,71,0.25);
      font-family:'Public Sans', sans-serif;
      font-size:11px;
      color:#b3ae9f;
      letter-spacing:.15px;
    }

    /* ================= CONSENT CHECKBOX ================= */
    .consent-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: -4px;
    }
    /* .auth-form input.consent-checkbox (not just .consent-checkbox) —
       signup.css has a broad ".auth-form input" rule (width:100%, padding,
       background) that otherwise wins on specificity and stretches this
       into a full-width bar instead of a small checkbox. */
    .auth-form input.consent-checkbox {
      appearance: none;
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      min-width: 18px;
      max-width: 18px;
      padding: 0;
      margin-top: 2px;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: rgba(255,255,255,0.03);
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    .auth-form input.consent-checkbox:hover { border-color: var(--brown-hover); }
    .auth-form input.consent-checkbox:checked {
      background: var(--brown);
      border-color: var(--brown);
    }
    .auth-form input.consent-checkbox:checked:hover { background: var(--brown-hover); border-color: var(--brown-hover); }
    .auth-form input.consent-checkbox:checked::after {
      content: "";
      position: absolute;
      left: 5px; top: 1px;
      width: 5px; height: 9px;
      border: solid var(--tan);
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }
    .auth-form input.consent-checkbox:focus-visible {
      outline: 2px solid var(--brown-hover);
      outline-offset: 2px;
    }
    .consent-text {
      font-size: 0.82rem;
      color: #D8D2C4;
      line-height: 1.45;
      padding-top: 1px;
    }
    .consent-text a {
      color: var(--tan);
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .consent-text a:hover { color: var(--tan-hover); }

    /* ================= PASSWORD STRENGTH METER ================= */
    .pw-strength-wrap { margin-top: -6px; margin-bottom: 2px; }
    .pw-strength-bars { display: flex; gap: 4px; margin-bottom: 8px; }
    .pw-strength-bar {
      height: 4px; flex: 1; border-radius: 2px;
      background: rgba(255,255,255,0.08);
      transition: background 0.2s ease;
    }
    .pw-strength-bar.filled-weak { background: #B3563F; }
    .pw-strength-bar.filled-fair { background: #B38A3F; }
    .pw-strength-bar.filled-good { background: #7C9A5A; }
    .pw-strength-bar.filled-strong { background: #5A9A73; }
    .pw-requirements { display: flex; flex-wrap: wrap; gap: 6px 14px; }
    .pw-requirement {
      font-size: 0.72rem; color: #7A756A;
      display: flex; align-items: center; gap: 5px;
      transition: color 0.15s ease;
    }
    .pw-requirement.met { color: #9BB088; }
    .pw-requirement .pw-req-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: currentColor; flex-shrink: 0;
    }
  </style>
</head>
<body>

  <header class="hero">
    <nav class="nav">
      <a href="index.html" class="wordmark" style="text-decoration: none;"><span class="wordmark-brand">Arko</span> | Early Access</a>
      <div class="nav-auth">
        <button type="button" class="btn-login" onclick="window.location.href='login.html'">Log in</button>
      </div>
    </nav>

    <div class="wip-banner">Early development · some features may not be live</div>

    <div class="auth-content">
      <h1>Create your account</h1>
      <p class="auth-subhead">Get set up in seconds.</p>

      <form class="auth-form" id="signup-form">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@email.com" required />

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required minlength="8" autocomplete="new-password" />

        <div class="pw-strength-wrap" id="pw-strength-wrap" style="display:none;">
          <div class="pw-strength-bars">
            <div class="pw-strength-bar" id="pw-bar-1"></div>
            <div class="pw-strength-bar" id="pw-bar-2"></div>
            <div class="pw-strength-bar" id="pw-bar-3"></div>
            <div class="pw-strength-bar" id="pw-bar-4"></div>
          </div>
          <div class="pw-requirements">
            <span class="pw-requirement" id="pw-req-length"><span class="pw-req-dot"></span>8+ characters</span>
            <span class="pw-requirement" id="pw-req-case"><span class="pw-req-dot"></span>Upper &amp; lowercase</span>
            <span class="pw-requirement" id="pw-req-number"><span class="pw-req-dot"></span>A number</span>
            <span class="pw-requirement" id="pw-req-symbol"><span class="pw-req-dot"></span>A symbol</span>
          </div>
        </div>

        <label class="consent-row" for="privacy-consent">
          <input type="checkbox" id="privacy-consent" class="consent-checkbox" required />
          <span class="consent-text">
            I agree to Arko's <a href="privacy-policy.html" target="_blank" rel="noopener" onclick="event.stopPropagation()">Privacy Policy</a>, including how my financial data is collected and used when I connect accounts via Plaid.
          </span>
        </label>

        <button type="submit" id="signup-button">Sign up</button>
      </form>

      <p class="auth-message" id="auth-message"></p>

      <button type="button" id="resend-button" class="btn-resend" style="display:none;">Resend confirmation email</button>

      <p class="auth-switch">Already have an account? <a href="login.html">Log in</a></p>
    </div>
  </header>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = "https://pkfkdmjuwkfkbkmlmoxq.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBrZmtkbWp1d2tma2JrbWxtb3hxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNzIxMTIsImV4cCI6MjA5ODg0ODExMn0.MWUcOvwttx1y0iE_Rcc6aUoJ7F5jmT-mMrQfOTwqmOY";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById('signup-form');
    const button = document.getElementById('signup-button');
    const message = document.getElementById('auth-message');
    const resendButton = document.getElementById('resend-button');

    let lastSignupEmail = '';

    // ================= PASSWORD STRENGTH =================
    function evaluatePassword(pw) {
      return {
        length: pw.length >= 8,
        case: /[a-z]/.test(pw) && /[A-Z]/.test(pw),
        number: /[0-9]/.test(pw),
        symbol: /[^A-Za-z0-9]/.test(pw),
      };
    }

    const pwInput = document.getElementById('password');
    pwInput.addEventListener('input', () => {
      const pw = pwInput.value;
      const wrap = document.getElementById('pw-strength-wrap');
      wrap.style.display = pw.length ? 'block' : 'none';
      if (!pw.length) return;

      const checks = evaluatePassword(pw);
      const metCount = Object.values(checks).filter(Boolean).length;

      ['length', 'case', 'number', 'symbol'].forEach(key => {
        document.getElementById('pw-req-' + key).classList.toggle('met', checks[key]);
      });

      const tiers = ['weak', 'weak', 'fair', 'good', 'strong'];
      const tier = tiers[metCount];
      for (let i = 1; i <= 4; i++) {
        const bar = document.getElementById('pw-bar-' + i);
        bar.className = 'pw-strength-bar' + (i <= metCount ? ' filled-' + tier : '');
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      message.textContent = '';
      message.className = 'auth-message';
      resendButton.style.display = 'none';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const pwChecks = evaluatePassword(password);
      if (!Object.values(pwChecks).every(Boolean)) {
        message.textContent = 'Password needs 8+ characters, upper & lowercase letters, a number, and a symbol.';
        message.classList.add('auth-message-error');
        return;
      }

      button.disabled = true;
      button.textContent = 'Creating account...';

      try {
        const { data, error } = await supabaseClient.auth.signUp({
          email,
          password,
          options: {
            emailRedirectTo: window.location.origin + '/login.html'
          }
        });

        if (error) {
          console.error('Signup error:', error);
          message.textContent = error.message || 'Something went wrong. Please try again.';
          message.classList.add('auth-message-error');
          return;
        }

        console.log('Signup response:', data);

        if (data.user && data.user.identities && data.user.identities.length === 0) {
          message.textContent = "An account with this email already exists. Try logging in instead.";
          message.classList.add('auth-message-error');
          return;
        }

        if (data.user && !data.session) {
          lastSignupEmail = email;
          message.textContent = "Check your email to confirm your account before logging in.";
          message.classList.add('auth-message-success');
          resendButton.style.display = 'inline-block';
        } else if (data.session) {
          message.textContent = "Account created! Redirecting...";
          message.classList.add('auth-message-success');
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
        }

      } catch (err) {
        console.error('Unexpected error:', err);
        message.textContent = 'Network error — please check your connection and try again.';
        message.classList.add('auth-message-error');
      } finally {
        button.disabled = false;
        button.textContent = 'Sign up';
      }
    });

    resendButton.addEventListener('click', async () => {
      if (!lastSignupEmail) return;

      resendButton.disabled = true;
      resendButton.textContent = 'Sending...';

      try {
        const { error } = await supabaseClient.auth.resend({
          type: 'signup',
          email: lastSignupEmail,
          options: {
            emailRedirectTo: window.location.origin + '/login.html'
          }
        });

        if (error) {
          console.error('Resend error:', error);
          message.textContent = error.message || 'Could not resend email. Please try again.';
          message.classList.add('auth-message-error');
        } else {
          message.textContent = "Confirmation email resent. Check your inbox.";
          message.className = 'auth-message auth-message-success';
        }
      } catch (err) {
        console.error('Unexpected resend error:', err);
        message.textContent = 'Network error — please try again.';
        message.classList.add('auth-message-error');
      } finally {
        resendButton.disabled = false;
        resendButton.textContent = 'Resend confirmation email';
      }
    });
  </script>

</body>
</html>
