<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In · Arko</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jura&family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Public+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="signup.css" />
  <link rel="icon" href="favicon.ico" sizes="any" />
<link rel="icon" type="image/png" href="favicon.png" />
<link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="favicon-512.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
</head>
<body>

  <header class="hero">
    <nav class="nav">
      <a href="index.html" class="wordmark" style="text-decoration: none;"><span class="wordmark-brand">Arko</span> | Pre-Alpha</a>
      <div class="nav-auth">
        <button type="button" class="btn-signup" onclick="window.location.href='signup.html'">Sign up</button>
      </div>
    </nav>

    <div class="auth-content">
      <h1>Welcome back</h1>
      <p class="auth-subhead">Log in to see your full picture.</p>

      <form class="auth-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@email.com" required />

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required minlength="8" />

        <button type="submit">Log in</button>
      </form>

      <p class="auth-switch">Don't have an account? <a href="signup.html">Sign up</a></p>
    </div>
  </header>

</body>
</html>
