<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in · Arko</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jura&family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Public+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="signup.css" />
</head>
<body>

  <header class="hero">
    <nav class="nav">
      <a href="index.html" class="wordmark" style="text-decoration: none;"><span class="wordmark-brand">Arko</span> | Pre-Alpha</a>
      <div class="nav-auth">
        <button type="button" class="btn-signup" onclick="window.location.href='signup.html'">Sign up</button>
      </div>
    </nav>

    <div class="auth-content">
      <h1>Welcome back</h1>
      <p class="auth-subhead">Log in to see your full picture.</p>

      <form class="auth-form" id="login-form">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@email.com" required />

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required minlength="8" />

        <button type="submit" id="login-button">Log in</button>
      </form>

      <p class="auth-message" id="auth-message"></p>

      <p class="auth-switch">Don't have an account? <a href="signup.html">Sign up</a></p>
    </div>
  </header>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = "https://pkfkdmjuwkfkbkmlmoxq.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBrZmtkbWp1d2tma2JrbWxtb3hxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNzIxMTIsImV4cCI6MjA5ODg0ODExMn0.MWUcOvwttx1y0iE_Rcc6aUoJ7F5jmT-mMrQfOTwqmOY";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById('login-form');
    const button = document.getElementById('login-button');
    const message = document.getElementById('auth-message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      message.textContent = '';
      message.className = 'auth-message';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      button.disabled = true;
      button.textContent = 'Logging in...';

      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

      button.disabled = false;
      button.textContent = 'Log in';

      if (error) {
        message.textContent = error.message;
        message.classList.add('auth-message-error');
        return;
      }

      message.textContent = "Logged in! Redirecting...";
      message.classList.add('auth-message-success');
      setTimeout(() => { window.location.href = 'index.html'; }, 800);
    });
  </script>

</body>
</html>
